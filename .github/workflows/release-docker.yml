name: Release Docker image to GHCR

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # GHA runners ship with ~30 GB of preinstalled SDK bloat (Android, .NET,
      # Haskell, GHC, dotnet, JS frameworks). Our Kali-based sandbox image is
      # ~19 GB and buildkit needs more scratch on top of that, so we free the
      # disk first or buildx fails with ResourceExhausted.
      - name: Free disk space
        run: |
          echo "Before:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL \
            /opt/microsoft /usr/local/.ghcup
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          sudo apt-get clean
          echo "After:"
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: meta
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lc=$REPO_OWNER" >> $GITHUB_OUTPUT

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push sandbox image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./containers/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/ziro-sandbox:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/ziro-sandbox:latest
          # Don't pull cache from the previous run — it's huge and counts
          # against runner disk twice (cache + new layers). Just push fresh.
          cache-to: type=gha,mode=max
