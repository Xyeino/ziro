name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: snok/install-poetry@v1

      - name: Build
        shell: bash
        run: |
          poetry install --with dev
          poetry run pyinstaller ziro.spec --noconfirm

          VERSION=$(poetry version -s)
          mkdir -p dist/release
          cp dist/ziro "dist/release/ziro-${VERSION}-linux-x86_64"
          chmod +x "dist/release/ziro-${VERSION}-linux-x86_64"
          tar -C dist/release -czvf "dist/release/ziro-${VERSION}-linux-x86_64.tar.gz" "ziro-${VERSION}-linux-x86_64"

      - uses: actions/upload-artifact@v4
        with:
          name: ziro-linux-x86_64
          path: dist/release/*.tar.gz
          if-no-files-found: error

  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push sandbox image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: containers/Dockerfile
          push: true
          tags: |
            ghcr.io/xyeino/ziro-sandbox:0.1.13
            ghcr.io/xyeino/ziro-sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [build, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: true
          files: release/*
