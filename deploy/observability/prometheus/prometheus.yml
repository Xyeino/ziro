global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ziro-panel
    static_configs:
      - targets: ["host.docker.internal:8420"]
    metrics_path: /api/metrics
    scrape_interval: 15s

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
