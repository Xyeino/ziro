# Default values for Ziro deployment on Kubernetes

# Number of panel replicas (each runs its own scan state in-process for now, so keep at 1)
replicaCount: 1

image:
  panel:
    repository: ghcr.io/xyeino/ziro
    tag: "latest"
    pullPolicy: IfNotPresent
  sandbox:
    repository: ghcr.io/xyeino/ziro-sandbox
    tag: "latest"
    pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

# LLM configuration — SECRETS ONLY. Use --set or a separate Secret resource.
llm:
  # e.g. "openai/gpt-5.4", "xai/grok-4-1-fast-reasoning", "vertex_ai/gemini-2.5-pro"
  model: ""
  # Name of existing Secret containing the LLM_API_KEY
  existingSecret: ""
  existingSecretKey: "LLM_API_KEY"
  # If existingSecret is empty, you can pass the key inline (NOT recommended for prod)
  apiKey: ""

# Ziro runtime config
config:
  scopeEnforce: true
  toolFailureBudget: 15
  checkpointInterval: 300
  toolCacheTtl: 1800
  maxIterations: 300
  sandboxIsolation: "loopback"
  rpmLimit: 0  # 0 = no limit

# Optional persona / threat actor
persona: ""
threatActor: ""

service:
  type: ClusterIP
  port: 8420
  # To expose externally, use an Ingress or change type to LoadBalancer
  nodePort: 0

ingress:
  enabled: false
  className: nginx
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: ziro.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: ziro-tls
    #   hosts:
    #     - ziro.example.com

resources:
  panel:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

# Docker-in-Docker sidecar for sandbox spawning
# NOTE: DinD requires privileged mode. If your cluster doesn't allow this,
# use an external Docker host via DOCKER_HOST env var instead.
dind:
  enabled: true
  image: docker:24-dind
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi

# Persistent storage for workspace + checkpoints
persistence:
  enabled: true
  size: 20Gi
  # storageClassName: ""
  accessMode: ReadWriteOnce

nodeSelector: {}
tolerations: []
affinity: {}

# Security context
podSecurityContext:
  fsGroup: 1000

securityContext: {}
# runAsNonRoot: true
# runAsUser: 1000
